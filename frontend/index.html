<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Where Is Wally - Prototype</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #canvas { border: 1px solid #ddd; cursor: crosshair; }
    #feedback { margin-top: 10px; font-size: 1.2em; }
  </style>
</head>
<body>
  <h1>Where Is Wally - Prototype</h1>
  <input type="file" id="fileInput" accept="image/*" />
  <p>Klik op de afbeelding om te zoeken. De app toont alleen tekst-feedback.</p>
  <canvas id="canvas"></canvas>
  <div id="feedback"></div>

  <script>
    const fileInput = document.getElementById('fileInput')
    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    const feedback = document.getElementById('feedback')
    let imageId = null
    let img = new Image()

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0]
      if (!file) return
      const url = URL.createObjectURL(file)
      img.src = url
      await new Promise(r => img.onload = r)

      // resize canvas to image display size
      canvas.width = img.naturalWidth
      canvas.height = img.naturalHeight
      ctx.drawImage(img, 0, 0)

      // upload to backend for detection
      const form = new FormData()
      form.append('file', file)
      feedback.textContent = 'Detectie aan het draaien...'
      const res = await fetch('http://localhost:8000/detect', { method: 'POST', body: form })
      const j = await res.json()
      if (j.status === 'ok' || j.status === 'no-detection') {
        imageId = j.image_id
        feedback.textContent = 'Afbeelding geüpload. Klik om te raden.'
      } else {
        feedback.textContent = 'Detectie mislukt.'
      }
    })

    canvas.addEventListener('click', async (e) => {
      if (!imageId) { feedback.textContent = 'Upload eerst een afbeelding.'; return }
      const rect = canvas.getBoundingClientRect()
      // get click in image pixel coordinates
      const x = (e.clientX - rect.left) * (img.naturalWidth / rect.width)
      const y = (e.clientY - rect.top) * (img.naturalHeight / rect.height)

      const payload = { image_id: imageId, x: Math.round(x), y: Math.round(y) }
      const res = await fetch('http://localhost:8000/click', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      })
      const j = await res.json()
      feedback.textContent = j.feedback || 'Geen reactie'
    })
  </script>
</body>
</html>
